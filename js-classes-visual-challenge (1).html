<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JS Classes – Visual Challenge</title>
</head>
<style>
  body {
    font-size: 20px;
  }
  button {
    padding: 1%;
    font-size: 1.3em;
  }
</style>
<body>

  <h2>Player 1</h2>
  <button id="btn1">Roll</button>
  <p id="result1"></p>

  <hr>

  <h2>Player 2</h2>
  <button id="btn2">Roll</button>
  <p id="result2"></p>

  <p id="winner"></p>


  <script>

    class Player {

      constructor(name, color) {
        this.name    = name;
        this.color   = color;

        // opacity starts at 0.5 — neutral, neither winning nor losing.
        // It climbs toward 1 with wins and drops toward 0 with losses.
        // Reaching 1 means this player has won the whole game.

        this.opacity = 0.5;
      }

      roll() {
        return Math.floor(Math.random() * 6) + 1;
      }

      win() {
        this.opacity = this.opacity + 0.1;
      }

      lose() {
        this.opacity = this.opacity - 0.1;
      }

      applyStyle(btn) {
        btn.style.opacity = this.opacity;
      }
    }


    // ── INSTANCES ─────────────────────────────────────────

    const player1 = new Player("Alice", "tomato");
    const player2 = new Player("Bob",   "steelblue");


    // ── BUTTONS ───────────────────────────────────────────

    const btn1 = document.querySelector('#btn1');
    const btn2 = document.querySelector('#btn2');

    btn1.style.background = player1.color;
    btn2.style.background = player2.color;

    // Set starting opacity on both buttons
    player1.applyStyle(btn1);
    player2.applyStyle(btn2);


    // ── ROLL TRACKING ─────────────────────────────────────

    let roll1 = null;
    let roll2 = null;


    // ── EVENT LISTENERS ───────────────────────────────────

    btn1.addEventListener('click', function () {
      roll1 = player1.roll();
      document.querySelector('#result1').textContent = `${player1.name} rolled ${roll1}`;
      if (roll2 !== null) compare();
    });

    btn2.addEventListener('click', function () {
      roll2 = player2.roll();
      document.querySelector('#result2').textContent = `${player2.name} rolled ${roll2}`;
      if (roll1 !== null) compare();
    });


    // ── COMPARE ───────────────────────────────────────────

    function compare() {

      const winnerBox = document.querySelector('#winner');

      if (roll1 > roll2) {
        player1.win();
        player2.lose();
        winnerBox.textContent = `${player1.name} wins the round!`;
        winnerBox.style.color = player1.color;

      } else if (roll2 > roll1) {
        player2.win();
        player1.lose();
        winnerBox.textContent = `${player2.name} wins the round!`;
        winnerBox.style.color = player2.color;

      } else {
        winnerBox.textContent = `Draw!`;
        winnerBox.style.color = "black";
      }

      // Push updated opacity to the buttons
      player1.applyStyle(btn1);
      player2.applyStyle(btn2);

      // Check if either player has reached full opacity — game over
      if (player1.opacity >= 1) {
        winnerBox.textContent = `${player1.name} wins the game!`;
        btn1.disabled = true;
        btn2.disabled = true;
      }

      if (player2.opacity >= 1) {
        winnerBox.textContent = `${player2.name} wins the game!`;
        btn1.disabled = true;
        btn2.disabled = true;
      }

      roll1 = null;
      roll2 = null;
    }

  </script>

</body>
</html>
