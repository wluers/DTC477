<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Canvas Smiley Face</title>
    <style>
        #myCanvas {
            border: 1px solid black;
            display: block;
            margin: 5% auto;
            /*width: 600px;*/ 
            /*height: 600px;*/
        }
        /* 
         Important: The CSS width & height only affect the display size, NOT the actual drawing size of the canvas.
           - The drawing area is controlled by the DOM properties: 
             <canvas width="600" height="600">
           - Even though CSS an stretch the canvas to 800px × 800px, the drawing commands still treat it as 600px × 600px.
      */

        /* Fixed coordinates display in top-right */
        #coordinates {
            position: fixed;
            top: 10px;
            right: 10px;
            background: black;
            color: white;
            padding: 8px;
            font-size: 16px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <canvas width="600" height="600" id="myCanvas"></canvas>
    <div id="coordinates">(x, y)</div>
    <script>
        // Get the canvas and 2D drawing context
        const c = document.getElementById("myCanvas");
        const ctx = c.getContext("2d");
        //The getContext("2d") method gives access to a bunch of drawing functions for shapes, text, images, and paths. There's also "webgl" for 3D graphics, but "2d" is the most common.
        const coordDisplay = document.getElementById("coordinates"); // box to display mouse hover canvas x,y coordinates


        // Function to generate a random integer within a range
        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // Function to draw the face
        function drawFace(eyeX, eyeY) {
            ctx.clearRect(0, 0, c.width, c.height); // Clear canvas before redrawing (for animation)

            // TEXT BOX
            ctx.font = "16px Arial"; // Increased font size for better visibility
            ctx.fillStyle = "black";
            ctx.textAlign = "right";  // Align text to the right
            ctx.fillText("Smiley Face", c.width - 10, 30); // Draw text in the top-right corner

            // DRAW FACE (Yellow Circle)
            ctx.beginPath();
            ctx.arc(300, 300, 200, 0, 2 * Math.PI); 
            // (x, y, radius, startAngle, endAngle)
            ctx.fillStyle = "yellow";
            ctx.fill();
            ctx.lineWidth = 4;
            ctx.strokeStyle = "black";
            ctx.stroke();
            ctx.closePath();

            // DRAW MOUTH (Half-Circle with Stroke)
            ctx.beginPath();
            ctx.arc(300, 370, 80, 0, Math.PI); 
            // half-circle mouth (x, y, radius, startAngle, endAngle, counterclockwise)
            ctx.lineTo(380, 370); // Connect back to the right side - top of the mouth
            ctx.stroke(); // Ensures the stroke is applied all around
            ctx.fillStyle = "white";
            ctx.fill();
            ctx.closePath();

            // DRAW EYES (Two White Circles)
            
            // Left eye
            ctx.beginPath();
            ctx.arc(230, 250, 30, 0, 2 * Math.PI); // (x, y, radius, startAngle, endAngle)
            ctx.closePath();
            ctx.fillStyle = "white";
            ctx.fill();
            ctx.stroke();

            // Right eye
            ctx.beginPath();
            ctx.arc(370, 250, 30, 0, 2 * Math.PI); 
            ctx.fillStyle = "white";
            ctx.fill();
            ctx.stroke();
            ctx.closePath();

            // DRAW NOSE BRIDGE (Slightly Angled Line)
            ctx.beginPath();
            ctx.moveTo(310, 260);  // Start at top of nose (moved up)
            ctx.lineTo(315, 300);  // Slight angle (moved up)
            ctx.stroke();
            ctx.closePath();

            // DRAW NOSE TIP (Half-Circle)
            ctx.beginPath();
            ctx.arc(310, 320, 20, 0, Math.PI); 
            ctx.stroke();
            ctx.closePath();

            // DRAW EYEBROWS (Two Separate Lines)

            // Left eyebrow
            ctx.beginPath();
            ctx.moveTo(180, 210);  
            ctx.lineTo(260, 190);
            ctx.stroke();
            ctx.closePath();

            // Right eyebrow
            ctx.beginPath();
            ctx.moveTo(420, 210); 
            ctx.lineTo(340, 190); 
            ctx.stroke();
            ctx.closePath();

            // DRAW EYEBALLS (Black Circles)

            // Left eyeball
            ctx.beginPath(); 
            ctx.arc(eyeX, eyeY, 9, 0, 2 * Math.PI);
            ctx.fillStyle = "black";
            ctx.fill();
            ctx.closePath();

            // Right eyeball
            ctx.beginPath(); 
            ctx.arc(eyeX + 140, eyeY, 10, 0, 2 * Math.PI);
            ctx.fillStyle = "black";
            ctx.fill();
            ctx.closePath();
            
        }




        // Function to animate the face
        function animateFace() {
            let eyeX = getRandomInt(220, 240); // Adjusted for new eye positions
            let eyeY = getRandomInt(245, 255);
            drawFace(eyeX, eyeY);

            setTimeout(() => requestAnimationFrame(animateFace), 1000); // Keeps the 1-second delay
        }

        // Start animation: re-draw canvas every second
        animateFace();

        // Updates coordinates in the top-right corner
        /*function updateCoordinates(event) {
            const rect = c.getBoundingClientRect(); // returns the position and size of an element relative to the viewport (the visible area of the browser window).
            const x = event.clientX - rect.left; //restricts coordinates to the canvas area mousemove
            const y = event.clientY - rect.top;

            coordDisplay.textContent = `X: ${Math.floor(x)}, Y: ${Math.floor(y)}`; // 
        }*/


        // Attach event listener
        /*c.addEventListener("mousemove", updateCoordinates);*/



       // ANIMATE with mouse movement

        // Draw the face once on load with the default pupil position
        drawFace(228, 248);

        // Redraw the face on every mouse movement over the canvas
        c.addEventListener("mousemove", (e) => {

            // getBoundingClientRect() returns the canvas position on the page.
            // e.clientX/Y is the mouse position relative to the viewport.
            // Subtracting rect.left/top converts it to canvas-local coordinates.
            const rect = c.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;


            // ── CONSTRAIN PUPIL ──────────────────────────────────────────────────
            // The mouse can move anywhere, but the pupil must stay inside the eye.
            // This function calculates where the pupil should sit, clamped to the
            // edge of the eye circle if the mouse goes outside it.

            function constrainPupil(eyeCX, eyeCY, eyeR, pupilSize) {

                // Vector from the eye center to the mouse position
                const dx = mx - eyeCX;
                const dy = my - eyeCY;

                // Distance from the eye center to the mouse
                const dist = Math.sqrt(dx * dx + dy * dy);

                // Maximum distance the pupil center can travel from the eye center
                // — stops at the inner edge of the eye circle with 4px padding
                const max = eyeR - pupilSize / 2 - 4;

                // If the mouse is outside the max range, scale the vector back to max.
                // ratio = 1 means the mouse is inside — use its exact position.
                // ratio < 1 means the mouse is outside — clamp to the edge.
                const ratio = dist > max ? max / dist : 1;

                // Return the pupil's top-left corner (arc uses center, but drawFace
                // uses fillRect so we offset by half the pupil size)
                return {
                    x: eyeCX + dx * ratio - pupilSize / 2,
                    y: eyeCY + dy * ratio - pupilSize / 2
                };
            }

            // Calculate constrained position for each pupil
            // Arguments: eye center x, eye center y, eye radius, pupil size
            const l = constrainPupil(230, 250, 30, 8); // left eye
            const r = constrainPupil(370, 250, 30, 8); // right eye

            // Redraw the entire canvas with the new pupil positions.
            // Canvas has no concept of moving one element — everything must be repainted.
            drawFace(l.x, l.y);

            updateCoordinates(e);
        });


    </script>
</body>
</html>
